name: Minify CSS

on:
  push:
    branches:
      - main

jobs:
  minify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clean-css-cli
        run: npm install -g clean-css-cli

      - name: Minify main.css (inline imports)
        run: cleancss --inline all -o main.min.css main.css

      - name: Commit minified CSS
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add main.min.css
          git diff --cached --quiet || git commit -m "chore: update minified CSS [skip ci]"
          git push
